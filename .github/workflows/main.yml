name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install isort
      - name: Run isort
        run: isort src/ --check-only --diff

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install tools
        run: |
          pip install bandit pip-audit safety
      - name: Run bandit
        run: bandit -r src/ -ll -f json -o bandit-report.json || true
      - name: Run pip-audit
        run: pip-audit --desc
      - name: Run safety
        run: safety check --full-report || true
      - name: Upload bandit report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  types:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy
      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile check
        run: python -m py_compile src/convert2.py
      - name: Import module
        run: python -c "import sys; sys.path.insert(0, 'src'); import convert2; assert hasattr(convert2, 'gui_mode')"
      - name: Run unit tests
        run: |
          if (Test-Path tests/) { pytest tests/ -v } else { echo "No tests found" }
        shell: pwsh

  build:
    name: Build .exe
    needs: [lint, security, types, test]
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl python-calamine pyinstaller
      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name="CalendarConverter" --hidden-import=calamine src/convert2.py
      - name: Check file size
        run: |
          $size = (Get-Item dist/CalendarConverter.exe).Length / 1MB
          Write-Host "EXE size: $([math]::Round($size, 2)) MB"
          if ($size -gt 150) {
            Write-Host "::warning::EXE size exceeds 150 MB ($([math]::Round($size, 2)) MB)"
          }
        shell: pwsh
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: CalendarConverter
          path: dist/CalendarConverter.exe
      - name: Smoke test
        run: |
          ./dist/CalendarConverter.exe --help || echo "Executable built"
          if (Test-Path dist/CalendarConverter.exe) { exit 0 } else { exit 1 }
        shell: pwsh
