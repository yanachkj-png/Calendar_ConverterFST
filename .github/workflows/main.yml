name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 isort
      - name: Run isort
        run: isort src/ --check-only --diff
      - name: Run flake8
        run: flake8 src/ --count --max-complexity=10 --statistics

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: |
          pip install bandit pip-audit
      - name: Run bandit
        run: bandit -r src/ -ll || true
      - name: Run pip-audit
        run: pip-audit --desc

  test:
    name: Unit Tests & Import
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check syntax
        run: python -m py_compile src/convert2.py
      - name: Import module
        run: python -c "import sys; sys.path.insert(0, 'src'); import convert2; assert hasattr(convert2, 'gui_mode')"

  build:
    name: Build .exe
    needs: [lint, security, test]
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl python-calamine pyinstaller
      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name="CalendarConverter" --hidden-import=calamine src/convert2.py
      - uses: actions/upload-artifact@v4
        with:
          name: CalendarConverter
          path: dist/CalendarConverter.exe
